{% extends 'base.html' %}
{% load static %}

{% block title %}Add Wallet - Admin Dashboard{% endblock %}

{% block content %}
<style>
    :root { --navy: #001f3f; --gold: #f39c12; }
    .admin-nav {
        background: linear-gradient(135deg, var(--navy) 0%, #003d5c 100%);
        border-bottom: 3px solid var(--gold);
    }
    .admin-nav .nav-link { color: white !important; padding: 12px 20px; font-weight: 500; }
    .admin-nav .nav-link.active { background: rgba(243, 156, 18, 0.2); }
</style>

<nav class="navbar navbar-expand-lg admin-nav sticky-top">
    <div class="container-fluid">
        <h6 class="navbar-brand mb-0 text-white"><i class="fas fa-shield-alt me-2"></i>Admin Dashboard</h6>
    </div>
</nav>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-plus me-2"></i>Add New Wallet Address</h5>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Cryptocurrency *</label>
                            <select name="crypto_type" class="form-select" required>
                                <option value="">Select Cryptocurrency</option>
                                {% for code, name in crypto_choices %}
                                <option value="{{ code }}">{{ name }} ({{ code }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Wallet Address *</label>
                            <input type="text" name="address" class="form-control" required placeholder="Enter wallet address">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Label (Optional)</label>
                            <input type="text" name="label" class="form-control" placeholder="e.g., Main BTC Wallet">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">QR Code Image (Optional)</label>
                            <input type="file" name="qr_code" class="form-control" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input type="checkbox" name="is_active" class="form-check-input" id="is_active" checked>
                                <label class="form-check-label" for="is_active">Active (visible to users)</label>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Save Wallet</button>
                            <a href="{% url 'dashboard:admin_wallets' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
